# CI workflow for bimifc
# Runs tests on push/PR, builds TUI binary and creates releases on tags
name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run tests on all platforms
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Linux requires graphics libs for Bevy
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libasound2-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev pkg-config

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace -- -D warnings

  # Build TUI binary for release
  build-tui:
    name: Build TUI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bimifc-tui-linux-x86_64
          # macOS x86_64 (cross-compiled from ARM)
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: bimifc-tui-macos-x86_64
          # macOS aarch64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: bimifc-tui-macos-aarch64
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bimifc-tui-windows-x86_64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: tui-${{ matrix.target }}

      - name: Build
        run: cargo build --release --package bimifc-viewer-tui --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bimifc-tui artifacts/${{ matrix.artifact }}
          chmod +x artifacts/${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "target/${{ matrix.target }}/release/bimifc-tui.exe" "artifacts/${{ matrix.artifact }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/*

  # Create GitHub release with binaries
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-tui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -la artifacts/

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          body: |
            ## Downloads

            ### ⌨️ TUI Viewer (bimifc-tui)
            Terminal-based IFC model viewer with floor plan rendering.
            - `bimifc-tui-linux-x86_64` - Linux (x86_64)
            - `bimifc-tui-macos-x86_64` - macOS Intel
            - `bimifc-tui-macos-aarch64` - macOS Apple Silicon
            - `bimifc-tui-windows-x86_64.exe` - Windows

            ### 🌐 Web Viewer
            Try the web viewer at [bimifc.de](https://bimifc.de)

            ### 📦 Packages
            - **crates.io**: `cargo add bimifc-parser` / `cargo add bimifc-geometry`

            ---
