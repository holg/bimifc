# Crates.io publishing workflow for bimifc
# Publishes all crates on version tags in dependency order
#
# Prerequisites:
#   1. Create a crates.io API token at https://crates.io/settings/tokens
#   2. Add it as CARGO_REGISTRY_TOKEN in GitHub repo Settings → Secrets → Actions
#
# Publish order (dependency graph):
#   1. bimifc-model        (no internal deps)
#   2. bimifc-parser       → model
#   3. bimifc-geometry     → model, parser
#   4. bimifc-bevy         → model, parser, geometry + eulumdat 0.5
#   5. bimifc-viewer-tui   → model, parser, geometry
#   6. bimifc-leptos       → model, parser, geometry + eulumdat 0.5 + optional: bimifc-bevy
#   7. bimifc-viewer       → model, parser, geometry, bevy, leptos (WASM cdylib)
name: Crates.io Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast check: are there any crates that actually need publishing?
  check-versions:
    name: Check which crates need publishing
    runs-on: ubuntu-latest
    outputs:
      needs_publish: ${{ steps.check.outputs.needs_publish }}
      publish_list: ${{ steps.check.outputs.publish_list }}
    steps:
      - uses: actions/checkout@v4

      - name: Check crates.io for already-published versions
        id: check
        shell: python3 {0}
        run: |
          import json, subprocess, os, tomllib

          crates = [
              "bimifc-model", "bimifc-parser", "bimifc-geometry",
              "bimifc-bevy", "bimifc-viewer-tui", "bimifc-leptos", "bimifc-viewer",
          ]

          to_publish = []
          for crate in crates:
              # Read local version from Cargo.toml
              toml_path = f"crates/{crate}/Cargo.toml"
              with open(toml_path, "rb") as f:
                  local_version = tomllib.load(f)["package"]["version"]

              # Check if this exact version exists on crates.io
              result = subprocess.run(
                  ["curl", "-sf", f"https://crates.io/api/v1/crates/{crate}/{local_version}"],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  print(f"  {crate} {local_version} — already published, skipping")
              else:
                  print(f"  {crate} {local_version} — needs publishing")
                  to_publish.append(crate)

          needs = "true" if to_publish else "false"
          publish_list = json.dumps(to_publish)
          print(f"\nNeeds publish: {needs}")
          print(f"Publish list: {publish_list}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"needs_publish={needs}\n")
              f.write(f"publish_list={publish_list}\n")

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-versions
    if: needs.check-versions.outputs.needs_publish == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Install Linux dependencies for Bevy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libasound2-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev pkg-config

      # Remove [patch.crates-io] — crates.io rejects crates with patch sections
      - name: Remove patch section from workspace Cargo.toml
        shell: python3 {0}
        run: |
          import re, pathlib
          p = pathlib.Path("Cargo.toml")
          p.write_text(re.sub(r'\n\[patch\.crates-io\].*', '', p.read_text(), flags=re.DOTALL))
          print(p.read_text())

      - name: Verify crates build
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      # Helper to publish only if not already on crates.io
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PUBLISH_LIST: ${{ needs.check-versions.outputs.publish_list }}
        shell: python3 {0}
        run: |
          import json, subprocess, os, time

          publish_list = json.loads(os.environ["PUBLISH_LIST"])

          # Dependency order — only publish crates that need it
          ordered = [
              "bimifc-model", "bimifc-parser", "bimifc-geometry",
              "bimifc-bevy", "bimifc-viewer-tui", "bimifc-leptos", "bimifc-viewer",
          ]

          no_verify = {"bimifc-viewer"}  # WASM cdylib needs --no-verify

          for crate in ordered:
              if crate not in publish_list:
                  print(f"\n>>> {crate} — already published, skipping")
                  continue

              print(f"\n>>> Publishing {crate}...")
              cmd = ["cargo", "publish", "-p", crate]
              if crate in no_verify:
                  cmd.append("--no-verify")

              result = subprocess.run(cmd)
              if result.returncode != 0:
                  print(f"    Warning: {crate} publish returned {result.returncode}")
              else:
                  print(f"    {crate} published successfully")

              # Wait for crates.io index to update before publishing dependents
              print("    Waiting 30s for crates.io index update...")
              time.sleep(30)

          print("\nDone!")
