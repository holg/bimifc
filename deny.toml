[licenses]
allow = [
  "0BSD",
  "AGPL-3.0-or-later",
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "allow"

[advisories]
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 unmaintained but stable, used transitively via leptos" },
  { id = "RUSTSEC-2026-0007", reason = "bytes integer overflow in reserve(), not exploitable in our usage" },
  { id = "RUSTSEC-2024-0436", reason = "paste unmaintained, transitive dep via Bevy — no alternative yet" },
]
